<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>OBS Overlay</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:1920px;height:1080px;overflow:hidden;background:transparent;}
  .zone{position:absolute;overflow:hidden;opacity:0;transition:opacity 0.4s ease;}
  .zone.visible{opacity:1;}
  .zone video,.zone img{width:100%;height:100%;display:block;}
  #countdown-el{position:absolute;font-family:'Arial Black',sans-serif;font-weight:900;transform:translate(-50%,-50%);white-space:nowrap;opacity:0;transition:opacity 0.4s ease;text-shadow:2px 2px 8px rgba(0,0,0,0.8);z-index:999;}
  #countdown-el.visible{opacity:1;}
</style>
</head>
<body>

<div id="countdown-el"></div>

<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCmNaMBf8Ps-r5IoENr3aAkcFR8XBgAq9g",
    authDomain: "karmine-corp-asset.firebaseapp.com",
    databaseURL: "https://karmine-corp-asset-default-rtdb.firebaseio.com",
    projectId: "karmine-corp-asset",
    storageBucket: "karmine-corp-asset.firebasestorage.app",
    messagingSenderId: "588622975676",
    appId: "1:588622975676:web:04f1e1c66553fb201536b9"
  };
</script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const params=new URLSearchParams(window.location.search);
const simpleId=params.get('simple');
const playerId=params.get('player');

firebase.initializeApp(FIREBASE_CONFIG);
const db=firebase.database();

let assets={},zones={},assignments={},renderedZones={},zoneTimers={};
let cdInterval=null;

// Track loading state
let assetsLoaded=false, zonesLoaded=false, assignmentsLoaded=false, slotLoaded=false;

function checkAndRender(){
  if(simpleId && assetsLoaded && slotLoaded) {
    const assetId=simpleSlotData?.assetId||null;
    if(simpleTimerInterval){clearTimeout(simpleTimerInterval);simpleTimerInterval=null;}
    currentSimpleAssetId=assetId;
    const asset=assetId?assets[assetId]:null;
    if(simpleSlotData?.timerEnabled&&asset){startSimpleTimer(asset,simpleSlotData);}
    else{renderSimple(asset);}
  }
  if(playerId && assetsLoaded && zonesLoaded && assignmentsLoaded) {
    rebuildZones();
  }
}

db.ref('assets').on('value',s=>{assets=s.val()||{};assetsLoaded=true;checkAndRender();});

// ====== COUNTDOWN ======
const cdEl=document.getElementById('countdown-el');

function formatCountdown(totalSeconds, data){
  const d=Math.floor(totalSeconds/86400);
  const h=Math.floor((totalSeconds%86400)/3600);
  const m=Math.floor((totalSeconds%3600)/60);
  const s=totalSeconds%60;
  let parts=[];
  if(data.showDays)    parts.push(String(d).padStart(2,'0')+(data.showLabels?'j':''));
  if(data.showHours)   parts.push(String(h).padStart(2,'0')+(data.showLabels?'h':''));
  if(data.showMinutes) parts.push(String(m).padStart(2,'0')+(data.showLabels?'m':''));
  if(data.showSeconds) parts.push(String(s).padStart(2,'0')+(data.showLabels?'s':''));
  if(!parts.length)    parts.push('00');
  return data.showLabels ? parts.join(' ') : parts.join(':');
}

db.ref('countdown').on('value',snap=>{
  const data=snap.val();
  if(cdInterval){clearInterval(cdInterval);cdInterval=null;}
  if(!data||!data.running){cdEl.classList.remove('visible');return;}
  const target=data.target||'all';
  const myId=simpleId||playerId||'';
  if(target!=='all'&&target!==myId){cdEl.classList.remove('visible');return;}
  cdEl.style.left=data.left+'%';
  cdEl.style.top=data.top+'%';
  cdEl.style.color=data.color||'#ffffff';
  cdEl.style.fontSize=(data.size||8)+'vw';
  cdEl.style.fontFamily=data.font||"'Arial Black',sans-serif";
  if(data.bg&&data.bg!=='transparent'){
    cdEl.style.background=data.bg;
    cdEl.style.padding='0.1em 0.3em';
    cdEl.style.borderRadius='8px';
  } else {
    cdEl.style.background='transparent';
    cdEl.style.padding='0';
  }
  function tick(){
    const remaining=Math.max(0,Math.round((data.endTime-Date.now())/1000));
    cdEl.textContent=formatCountdown(remaining,data);
    cdEl.classList.add('visible');
    if(remaining<=0){clearInterval(cdInterval);cdInterval=null;setTimeout(()=>cdEl.classList.remove('visible'),3000);}
  }
  tick();
  cdInterval=setInterval(tick,500);
});

// ====== MODE SIMPLE ======
let simpleEl=null,currentSimpleAssetId=null,simpleTimerInterval=null,simpleSlotData=null;

if(simpleId){
  db.ref('simpleSlots/'+simpleId).on('value',snap=>{
    simpleSlotData=snap.val();
    slotLoaded=true;
    checkAndRender();
  });
}

function startSimpleTimer(asset,slot){
  const showMs=(slot.showDuration||30)*1000;
  const hideMs=(slot.hideDuration||15)*60*1000;
  function show(){
    renderSimple(asset);
    simpleTimerInterval=setTimeout(()=>{
      hideSimple();
      simpleTimerInterval=setTimeout(()=>show(),hideMs);
    },showMs);
  }
  show();
}

function hideSimple(){
  if(simpleEl){simpleEl.classList.remove('visible');setTimeout(()=>{if(simpleEl){simpleEl.remove();simpleEl=null;}},400);}
}

function renderSimple(asset){
  hideSimple();
  if(!asset)return;
  setTimeout(()=>{
    const el=document.createElement('div');
    el.className='zone';
    el.style.cssText='left:0;top:0;width:100%;height:100%;';
    let media;
    if(asset.type==='video'){media=document.createElement('video');media.src=asset.url;media.loop=true;media.muted=!asset.sound;media.autoplay=true;media.playsInline=true;media.style.objectFit='contain';media.onloadeddata=()=>media.play().catch(()=>{});}
    else{media=document.createElement('img');media.src=asset.url;media.style.objectFit='contain';}
    el.appendChild(media);document.body.appendChild(el);simpleEl=el;
    setTimeout(()=>el.classList.add('visible'),50);
  },400);
}

// ====== MODE ZONES ======
if(playerId){
  let commonLoaded=false, playerLoaded=false;
  db.ref('zones').on('value',s=>{zones=s.val()||{};zonesLoaded=true;checkAndRender();});
  db.ref('assignments/common').on('value',s=>{assignments['common']=s.val()||{};commonLoaded=true;if(commonLoaded&&playerLoaded){assignmentsLoaded=true;}checkAndRender();});
  db.ref('assignments/'+playerId).on('value',s=>{assignments[playerId]=s.val()||{};playerLoaded=true;if(commonLoaded&&playerLoaded){assignmentsLoaded=true;}checkAndRender();});
}

function rebuildZones(){
  if(!Object.keys(zones).length)return;
  Object.entries(zones).forEach(([zoneId,zone])=>{
    // Text-only zone
    if(zone.mode==='text'){
      const textKey='tz_'+zoneId;
      if(renderedZones[textKey]===zone.tzText+'|'+zone.tzSize+'|'+zone.tzColor)return;
      renderedZones[textKey]=zone.tzText+'|'+zone.tzSize+'|'+zone.tzColor;
      let el=document.getElementById('z_'+zoneId);
      if(!el){el=document.createElement('div');el.id='z_'+zoneId;el.className='zone';document.body.appendChild(el);}
      el.style.left=zone.left+'%';el.style.top=zone.top+'%';
      el.style.width=zone.width+'%';el.style.height=zone.height+'%';
      el.style.display='flex';el.style.alignItems='center';el.style.justifyContent=zone.tzAlign==='left'?'flex-start':zone.tzAlign==='right'?'flex-end':'center';
      el.innerHTML='';
      if(zone.tzText){
        const t=document.createElement('div');
        t.style.cssText='color:'+(zone.tzColor||'#fff')+';font-size:'+(zone.tzSize||5)+'vw;font-family:'+(zone.tzFont||'Arial Black,sans-serif')+';font-weight:700;'+(zone.tzShadow!==false?'text-shadow:2px 2px 8px rgba(0,0,0,.9);':'')+';white-space:pre-line;text-align:'+(zone.tzAlign||'center')+';line-height:1.2;width:100%;padding:4px;';
        t.textContent=zone.tzText;
        el.appendChild(t);
        el.classList.add('visible');
      } else {
        el.classList.remove('visible');
      }
      return;
    }

    const assetId=zone.scope==='common'?assignments['common']?.[zoneId]||null:assignments[playerId]?.[zoneId]||null;
    if(renderedZones[zoneId]===assetId)return;
    renderedZones[zoneId]=assetId;
    // Annule l'éventuel timer précédent pour cette zone
    if(zoneTimers[zoneId]){clearTimeout(zoneTimers[zoneId]);delete zoneTimers[zoneId];}
    let el=document.getElementById('z_'+zoneId);
    if(!el){el=document.createElement('div');el.id='z_'+zoneId;el.className='zone';document.body.appendChild(el);}
    el.style.left=zone.left+'%';el.style.top=zone.top+'%';el.style.width=zone.width+'%';el.style.height=zone.height+'%';
    const asset=assetId?assets[assetId]:null;
    if(!asset){el.classList.remove('visible');setTimeout(()=>{el.innerHTML='';},400);return;}

    function showZoneAsset(){
      el.classList.remove('visible');
      setTimeout(()=>{
        el.innerHTML='';
        let media;
        if(asset.type==='video'){media=document.createElement('video');media.src=asset.url;media.loop=true;media.muted=!asset.sound;media.autoplay=true;media.playsInline=true;media.style.objectFit=zone.fit||'contain';media.onloadeddata=()=>media.play().catch(()=>{});}
        else{media=document.createElement('img');media.src=asset.url;media.style.objectFit=zone.fit||'contain';}
        el.appendChild(media);
        // Text overlay
        if(zone.textEnabled&&zone.text){
          const textEl=document.createElement('div');
          const bgCss=zone.textBg==='dark'?'background:rgba(0,0,0,0.6);padding:4px 10px;border-radius:6px;':zone.textBg==='light'?'background:rgba(255,255,255,0.8);padding:4px 10px;border-radius:6px;':'';
          const shadowCss=(!zone.textBg||zone.textBg==='none')?'text-shadow:2px 2px 6px rgba(0,0,0,.8);':'';
          const colorCss=zone.textBg==='light'?'#000':zone.textColor||'#fff';
          textEl.style.cssText='position:absolute;left:'+zone.textX+'%;top:'+zone.textY+'%;transform:translate(-50%,-50%);color:'+colorCss+';font-size:'+(zone.textSize||3)+'vw;font-family:'+(zone.textFont||'Arial Black,sans-serif')+';font-weight:700;'+shadowCss+bgCss+'white-space:pre-line;z-index:10;pointer-events:none;text-align:center;line-height:1.3;';
          if(zone.counterEnabled){
            const counterKey='counters/'+zoneId+(playerId?'_'+playerId:'');
            db.ref(counterKey).on('value',function(snap){
              const val=snap.val()!==null?snap.val():(zone.counterStart||0);
              textEl.textContent=(zone.text||'')+val;
            });
          } else {
            textEl.textContent=zone.text||'';
          }
          el.appendChild(textEl);
        }
        setTimeout(()=>el.classList.add('visible'),50);
        if(zone.timerEnabled){
          const showMs=(zone.showDuration||30)*1000;
          const hideMs=(zone.hideDuration||15)*60*1000;
          zoneTimers[zoneId]=setTimeout(()=>{
            el.classList.remove('visible');
            zoneTimers[zoneId]=setTimeout(()=>showZoneAsset(),hideMs);
          },showMs);
        }
      },300);
    }
    showZoneAsset();
  });
  Object.keys(renderedZones).forEach(zoneId=>{if(!zones[zoneId]){const el=document.getElementById('z_'+zoneId);if(el)el.remove();delete renderedZones[zoneId];}});
}

function rebuild(){
  checkAndRender();
}

// ====== ONE-SHOT ======
let oneshotEl=null;
let lastShownFireId=null;

db.ref('oneshot').on('value',function(snap){
  const data=snap.val();
  if(!data||!data.triggeredAt)return;

  // Check target
  if(data.target!=='all'){
    if(data.target.startsWith('player:')){
      const targetPlayer=data.target.replace('player:','');
      if(!playerId||playerId!==targetPlayer)return;
    } else if(data.target.startsWith('slot:')){
      const targetSlot=data.target.replace('slot:','');
      if(!simpleId||simpleId!==targetSlot)return;
    } else {
      const myId=simpleId||playerId||'';
      if(myId!==data.target)return;
    }
  }

  // Don't re-show if already shown this fireId
  if(data.fireId && data.fireId===lastShownFireId)return;

  // Check not too old (duration + 10 seconds grace period)
  const age=Date.now()-data.triggeredAt;
  if(age>data.duration*1000+10000)return;

  // Mark as shown
  if(data.fireId)lastShownFireId=data.fireId;

  // Remove existing oneshot
  if(oneshotEl){oneshotEl.remove();oneshotEl=null;}

  // Si les assets ne sont pas encore chargés, attend puis réessaie
  function showOneshotWhenReady(data, attempts){
    const asset=data.assetId?assets[data.assetId]:null;
    if(!asset){
      if(attempts>0){
        setTimeout(function(){showOneshotWhenReady(data, attempts-1);}, 500);
      }
      return;
    }
    displayOneshot(data, asset);
  }
  showOneshotWhenReady(data, 10);
  return;
});

function displayOneshot(data, asset){
  if(oneshotEl){oneshotEl.remove();oneshotEl=null;}

  // Determine position
  let posStyle='left:0;top:0;width:100%;height:100%;';
  if(data.posLeft!==undefined){
    posStyle='left:'+data.posLeft+'%;top:'+data.posTop+'%;width:'+data.posWidth+'%;height:'+data.posHeight+'%;';
  }
  const el=document.createElement('div');
  el.style.cssText='position:absolute;'+posStyle+'z-index:500;opacity:0;transition:opacity 0.4s ease;overflow:hidden;';

  let media;
  if(asset.type==='video'){
    media=document.createElement('video');
    media.src=asset.url;
    media.muted=!asset.sound;
    media.autoplay=true;
    media.playsInline=true;
    media.style.cssText='width:100%;height:100%;object-fit:contain;';
    media.onloadeddata=function(){media.play().catch(()=>{});};
  } else {
    media=document.createElement('img');
    media.src=asset.url;
    media.style.cssText='width:100%;height:100%;object-fit:contain;';
  }
  el.appendChild(media);

  // Text overlay
  if(data.textEnabled&&data.text){
    const textEl=document.createElement('div');
    const txPct=data.posLeft!==undefined?((data.textSize||5)*(100/data.posWidth)):data.textSize||5;
    textEl.style.cssText='position:absolute;left:'+(data.textX||50)+'%;top:'+(data.textY||80)+'%;transform:translate(-50%,-50%);color:'+(data.textColor||'#fff')+';font-size:'+(data.textSize||5)+'vw;font-family:'+(data.textFont||'Arial Black,sans-serif')+';font-weight:700;text-shadow:2px 2px 6px rgba(0,0,0,.8);white-space:pre-line;z-index:10;pointer-events:none;text-align:center;line-height:1.3;';
    textEl.textContent=data.text;
    el.appendChild(textEl);
  }

  document.body.appendChild(el);
  oneshotEl=el;
  setTimeout(function(){el.style.opacity='1';},50);

  // Auto-hide after duration
  const age2=Date.now()-data.triggeredAt;
  const remaining=Math.max(1000, data.duration*1000-age2);
  setTimeout(function(){
    el.style.opacity='0';
    setTimeout(function(){if(el.parentNode)el.remove();if(oneshotEl===el)oneshotEl=null;},400);
  },remaining);
}

// ====== RELOAD SIGNAL ======
// Écoute un signal de rechargement forcé depuis l'admin
db.ref('reloadSignal').on('value', function(snap){
  const data = snap.val();
  if(!data||!data.triggeredAt) return;
  const age = Date.now() - data.triggeredAt;
  if(age > 5000) return; // ignore si plus de 5 secondes
  // Vérifie si ce joueur est ciblé
  const target = data.target||'all';
  if(target !== 'all'){
    if(target.startsWith('player:') && (!playerId || playerId !== target.replace('player:',''))) return;
    if(target.startsWith('slot:') && (!simpleId || simpleId !== target.replace('slot:',''))) return;
  }
  // Reload !
  setTimeout(function(){ location.reload(); }, 500);
});

// ====== AUTO-REFRESH INTELLIGENT ======
// Recharge automatiquement si rien n'est affiché

function hasVisibleContent(){
  return document.querySelectorAll('.zone.visible').length > 0;
}

function shouldHaveContent(){
  if(simpleId && simpleSlotData && simpleSlotData.assetId) return true;
  if(playerId && assignments[playerId]){
    return Object.values(assignments[playerId]).some(function(v){return !!v;});
  }
  return false;
}

// Check après 3 secondes — si des assets devraient s'afficher mais ne le font pas
setTimeout(function(){
  if(shouldHaveContent() && !hasVisibleContent()){
    location.reload();
  }
}, 3000);

// Check après 8 secondes — deuxième chance
setTimeout(function(){
  if(shouldHaveContent() && !hasVisibleContent()){
    location.reload();
  }
}, 8000);

// Recharge complète toutes les 5 minutes pour s'assurer que tout est à jour
// Seulement si aucun one-shot n'est en cours
setInterval(function(){
  if(!oneshotEl){
    location.reload();
  }
}, 5 * 60 * 1000);

// Vérification toutes les 20 secondes
setInterval(function(){
  if(shouldHaveContent() && !hasVisibleContent() && !oneshotEl){
    location.reload();
  }
}, 20000);
</script>
</body>
</html>
