<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>OBS Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
  .zone { position: absolute; overflow: hidden; }
  .zone video, .zone img {
    width: 100%; height: 100%;
    display: block;
  }
  .zone-fade { opacity: 0; transition: opacity 0.4s ease; }
  .zone-fade.visible { opacity: 1; }
</style>
</head>
<body>

<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCmNaMBf8Ps-r5IoENr3aAkcFR8XBgAq9g",
    authDomain: "karmine-corp-asset.firebaseapp.com",
    databaseURL: "https://karmine-corp-asset-default-rtdb.firebaseio.com",
    projectId: "karmine-corp-asset",
    storageBucket: "karmine-corp-asset.firebasestorage.app",
    messagingSenderId: "588622975676",
    appId: "1:588622975676:web:04f1e1c66553fb201536b9"
  };
</script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// Récupère le slot depuis l'URL : overlay.html?slot=slot_1
const params = new URLSearchParams(window.location.search);
const slotId = params.get('slot');

if (!slotId) {
  console.error('Aucun slot dans l\'URL. Ajoute ?slot=slot_1');
}

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

// État local
let zones = {};
let assignments = {};
let assets = {};
let renderedZones = {}; // zoneId -> current assetId affiché

// ============================
// ÉCOUTE FIREBASE EN TEMPS RÉEL
// ============================

db.ref('assets').on('value', snap => {
  assets = snap.val() || {};
  rebuildAll();
});

db.ref('zones').on('value', snap => {
  zones = snap.val() || {};
  rebuildAll();
});

// Écoute les assignments communs
db.ref('assignments/common').on('value', snap => {
  assignments['common'] = snap.val() || {};
  rebuildAll();
});

// Écoute les assignments du slot courant
if (slotId) {
  db.ref('assignments/' + slotId).on('value', snap => {
    assignments[slotId] = snap.val() || {};
    rebuildAll();
  });
}

// ============================
// CONSTRUCTION DES ZONES
// ============================
function rebuildAll() {
  if (!Object.keys(zones).length) return;

  Object.entries(zones).forEach(([zoneId, zone]) => {
    // Détermine quel asset afficher
    let assetId = null;
    if (zone.scope === 'common') {
      assetId = assignments['common']?.[zoneId] || null;
    } else {
      assetId = slotId ? (assignments[slotId]?.[zoneId] || null) : null;
    }

    // Vérifie si on a besoin de mettre à jour cette zone
    if (renderedZones[zoneId] === assetId) return;
    renderedZones[zoneId] = assetId;

    // Crée ou récupère l'élément de zone
    let el = document.getElementById('zone-' + zoneId);
    if (!el) {
      el = document.createElement('div');
      el.id = 'zone-' + zoneId;
      el.className = 'zone zone-fade';
      document.body.appendChild(el);
    }

    // Applique la position et la taille
    el.style.left = zone.left + '%';
    el.style.top = zone.top + '%';
    el.style.width = zone.width + '%';
    el.style.height = zone.height + '%';

    // Affiche l'asset ou vide la zone
    if (!assetId || !assets[assetId]) {
      el.classList.remove('visible');
      setTimeout(() => { el.innerHTML = ''; }, 400);
      return;
    }

    const asset = assets[assetId];
    el.classList.remove('visible');

    setTimeout(() => {
      el.innerHTML = '';
      let media;

      if (asset.type === 'video') {
        media = document.createElement('video');
        media.src = asset.url;
        media.loop = true;
        media.muted = true;
        media.autoplay = true;
        media.playsInline = true;
        media.style.objectFit = zone.fit || 'contain';
        media.onloadeddata = () => media.play().catch(() => {});
      } else {
        media = document.createElement('img');
        media.src = asset.url;
        media.style.objectFit = zone.fit || 'contain';
      }

      el.appendChild(media);
      setTimeout(() => el.classList.add('visible'), 50);
    }, 300);
  });

  // Supprime les zones qui n'existent plus
  Object.keys(renderedZones).forEach(zoneId => {
    if (!zones[zoneId]) {
      const el = document.getElementById('zone-' + zoneId);
      if (el) el.remove();
      delete renderedZones[zoneId];
    }
  });
}
</script>
</body>
</html>
